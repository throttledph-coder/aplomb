<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#1a1a18" />
    <meta name="robots" content="noindex" />
    <title>Payment received — Aplomb</title>
    <style>
      :root {
        --bg: hsl(60 3% 9%); --card: hsl(60 3% 14%); --border: hsl(60 2% 22%);
        --fg: hsl(60 9% 96%); --muted: hsl(60 4% 64%); --primary: hsl(15 63% 60%);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; background: var(--bg); color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        line-height: 1.6; display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 0 24px; text-align: center;
      }
      .badge {
        width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 50%;
        background: hsl(15 63% 55% / 0.14); color: var(--primary);
        display: flex; align-items: center; justify-content: center;
      }
      h1 { font-size: clamp(22px, 5vw, 30px); letter-spacing: -0.02em; margin: 0 0 8px; }
      p { color: var(--muted); max-width: 460px; margin: 0 0 8px; }
      a { color: var(--primary); text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="badge" aria-hidden="true">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>Payment received</h1>
    <p>Your Aplomb Pro pass is active for 30 days. Head back to the Aplomb app — your
       status updates automatically within a few seconds.</p>
    <p>You can close this tab. <a href="/">Back to aplomb</a></p>
  </body>
</html>
